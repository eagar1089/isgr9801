<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sagar Parab banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.5" stop-color="#12203B"/>
      <stop offset="1" stop-color="#20123A"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 120) rotate(34) scale(380 280)">
      <stop stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1220 380) rotate(18) scale(420 260)">
      <stop stop-color="#C084FC" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="180" y1="130" x2="1180" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="500" rx="28" fill="url(#bg)"/>
  <circle cx="360" cy="120" r="340" fill="url(#glowLeft)"/>
  <circle cx="1220" cy="380" r="360" fill="url(#glowRight)"/>

  <rect x="120" y="95" width="1120" height="310" rx="28" fill="white" fill-opacity="0.08"/>
  <rect x="120" y="95" width="1120" height="310" rx="28" stroke="url(#stroke)" stroke-opacity="0.8" stroke-width="2"/>

  <text x="180" y="225" fill="#F8FAFC" font-size="78" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">Sagar Parab</text>
  <text x="180" y="295" fill="#D1E5FF" font-size="38" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="500">Linux Administrator • Full-Stack Web Explorer</text>
  <text x="180" y="350" fill="#B7C6DD" font-size="26" font-family="Segoe UI, Inter, Arial, sans-serif">Building reliable systems and crafting modern web experiences</text>
</svg>
