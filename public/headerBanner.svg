<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sagar Parab profile banner">
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="1560" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D1135"/>
      <stop offset="0.5" stop-color="#0E3557"/>
      <stop offset="1" stop-color="#2D0A31"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="100" y1="80" x2="1500" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C084FC" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1600" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="38" fill="url(#bg)"/>

  <g opacity="0.45">
    <circle cx="210" cy="100" r="90" fill="#A855F7"/>
    <circle cx="1450" cy="420" r="130" fill="#06B6D4"/>
    <circle cx="1320" cy="90" r="80" fill="#F472B6"/>
  </g>

  <rect x="56" y="56" width="1488" height="408" rx="30" fill="white" fill-opacity="0.08"/>
  <g filter="url(#glow)">
    <rect x="56" y="56" width="1488" height="408" rx="30" stroke="url(#cardStroke)" stroke-width="3"/>
  </g>

  <text x="120" y="238" fill="#F8FAFC" font-size="92" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="800">Sagar Parab</text>
  <text x="122" y="314" fill="#E2E8F0" font-size="40" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="500">Linux Administrator • Full-Stack Web Explorer</text>
  <text x="122" y="364" fill="#CBD5E1" font-size="30" font-family="Segoe UI, Inter, Arial, sans-serif">Building reliable systems and modern web products end-to-end</text>
</svg>
